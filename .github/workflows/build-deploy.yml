name: Build & Deploy Slidev

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (for PDF export)
        run: npx playwright install chromium

      - name: Build HTML site (Module 1.1)
        run: npx slidev build modules/module-1-1-cloud-foundations/slides.md --base /ovhcloud-pcca-content/module-1-1/ --out $GITHUB_WORKSPACE/dist/module-1-1

      - name: DEBUG — contents of dist after HTML build
        run: |
          echo "=== dist/ ==="
          ls -la dist/
          echo "=== dist/module-1-1/ ==="
          ls -la dist/module-1-1/ | head -20

      - name: Create root index with module list
        run: |
          mkdir -p dist
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>OVHcloud — Public Cloud — Core Associate</title>
            <style>
              body { font-family: 'Inter', sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 2rem; color: #1A1A1A; }
              h1 { color: #000E9C; border-bottom: 4px solid #000E9C; padding-bottom: 0.4rem; }
              a { color: #0050D7; text-decoration: none; font-weight: 600; }
              a:hover { text-decoration: underline; }
              ul { list-style: none; padding: 0; }
              li { padding: 0.8rem 0; border-bottom: 1px solid #E5E5E5; }
              .badge { background: #000E9C; color: white; padding: 0.15rem 0.6rem; border-radius: 999px; font-size: 0.75rem; margin-right: 0.5rem; }
            </style>
          </head>
          <body>
            <h1>OVHcloud — Public Cloud — Core Associate</h1>
            <p>Modules available in this build:</p>
            <ul>
              <li><span class="badge">1.1</span><a href="module-1-1/">Cloud Foundations &amp; OVHcloud Positioning</a></li>
            </ul>
            <p style="margin-top: 3rem; font-size: 0.85rem; color: #8A8A8A;">
              Internal training content — OVHcloud Product Enablement.
            </p>
          </body>
          </html>
          EOF

      - name: Export PDF (Module 1.1)
        run: npx slidev export modules/module-1-1-cloud-foundations/slides.md --output $GITHUB_WORKSPACE/dist/module-1-1/downloads/module-1-1-cloud-foundations.pdf

      - name: DEBUG — contents of dist after first PDF export
        run: |
          echo "=== dist/module-1-1/ after PDF 1 ==="
          ls -la dist/module-1-1/ | head -20

      - name: Export PDF with trainer notes (Module 1.1)
        run: npx slidev export modules/module-1-1-cloud-foundations/slides.md --with-clicks --with-toc --output $GITHUB_WORKSPACE/dist/module-1-1/downloads/module-1-1-trainer-notes.pdf

      - name: DEBUG — contents of dist before Pages upload
        run: |
          echo "=== dist/ final ==="
          find dist -maxdepth 3 -type f | head -30

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: module-1-1-build
          path: dist/module-1-1/
          retention-days: 30

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4