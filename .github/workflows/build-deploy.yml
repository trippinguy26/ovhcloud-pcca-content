name: Build & Deploy Slidev

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (for PDF export)
        run: npx playwright install chromium

      - name: Build HTML site (Module 1.1)
        run: npx slidev build modules/module-1-1-cloud-foundations/slides.md --base /ovhcloud-pcca-content/ --out dist/module-1-1

      - name: Export PDF (Module 1.1)
        run: npx slidev export modules/module-1-1-cloud-foundations/slides.md --output dist/module-1-1/module-1-1-cloud-foundations.pdf

      - name: Export PDF with trainer notes (Module 1.1)
        run: npx slidev export modules/module-1-1-cloud-foundations/slides.md --with-clicks --with-toc --output dist/module-1-1/module-1-1-trainer-notes.pdf

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: module-1-1-build
          path: dist/module-1-1/
          retention-days: 30

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
