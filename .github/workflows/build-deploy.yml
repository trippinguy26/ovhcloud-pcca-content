name: Build & Deploy Slidev

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Discover modules to build from modules.json (published only)
  # ---------------------------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      count: ${{ steps.set-matrix.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build matrix from modules.json
        id: set-matrix
        run: |
          matrix=$(jq -c '{include: [.modules[] | select(.status == "published") | {id, slug, title}]}' modules.json)
          count=$(jq '[.modules[] | select(.status == "published")] | length' modules.json)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Discovered $count published module(s):"
          jq -r '.modules[] | select(.status == "published") | "  - \(.id) \(.slug)"' modules.json

  # ---------------------------------------------------------------------------
  # Build each published module in parallel (HTML site + PDFs)
  # ---------------------------------------------------------------------------
  build-module:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (for PDF export)
        run: npx playwright install chromium

      - name: Compute module path & URL base
        id: paths
        run: |
          module_id_url="$(echo '${{ matrix.id }}' | tr '.' '-')"
          echo "module_id_url=$module_id_url" >> "$GITHUB_OUTPUT"
          echo "slides_path=modules/${{ matrix.slug }}/slides.md" >> "$GITHUB_OUTPUT"
          echo "out_dir=$GITHUB_WORKSPACE/dist/module-$module_id_url" >> "$GITHUB_OUTPUT"

      - name: Build HTML site
        run: |
          npx slidev build "${{ steps.paths.outputs.slides_path }}" \
            --base "/${{ github.event.repository.name }}/module-${{ steps.paths.outputs.module_id_url }}/" \
            --out "${{ steps.paths.outputs.out_dir }}"

      - name: Export PDF (learner version)
        run: |
          npx slidev export "${{ steps.paths.outputs.slides_path }}" \
            --output "${{ steps.paths.outputs.out_dir }}/downloads/module-${{ steps.paths.outputs.module_id_url }}.pdf"

      - name: Export PDF (with trainer notes)
        run: |
          npx slidev export "${{ steps.paths.outputs.slides_path }}" \
            --with-clicks --with-toc \
            --output "${{ steps.paths.outputs.out_dir }}/downloads/module-${{ steps.paths.outputs.module_id_url }}-trainer-notes.pdf"

      - name: Upload module artifact (for PR preview & deploy job)
        uses: actions/upload-artifact@v4
        with:
          name: module-${{ steps.paths.outputs.module_id_url }}
          path: ${{ steps.paths.outputs.out_dir }}
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Assemble the full dist/ on main: download each module artifact, generate
  # the root index.html from modules.json, then upload as Pages artifact.
  # ---------------------------------------------------------------------------
  assemble:
    if: github.ref == 'refs/heads/main'
    needs: [discover, build-module]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all module artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: module-*
          merge-multiple: false

      - name: Inspect downloaded layout
        run: |
          echo "=== dist/ layout ==="
          find dist -maxdepth 2 -mindepth 1 -type d | sort

      - name: Generate root index.html from modules.json
        run: node scripts/build-index.mjs --out dist

      - name: Verify final dist/
        run: |
          echo "=== dist/ final ==="
          find dist -maxdepth 3 -type f | sort | head -50

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ---------------------------------------------------------------------------
  # Deploy to GitHub Pages (main only)
  # ---------------------------------------------------------------------------
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: assemble
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
